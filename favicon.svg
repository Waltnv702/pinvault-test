<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>
  <!-- Castle body -->
  <rect x="8" y="16" width="16" height="11" rx="1" fill="white" opacity="0.95"/>
  <!-- Castle door -->
  <rect x="13" y="20" width="6" height="7" rx="2" fill="#7c3aed"/>
  <!-- Castle towers -->
  <rect x="7" y="12" width="5" height="10" rx="1" fill="white" opacity="0.95"/>
  <rect x="20" y="12" width="5" height="10" rx="1" fill="white" opacity="0.95"/>
  <!-- Center tower -->
  <rect x="12" y="9" width="8" height="10" rx="1" fill="white"/>
  <!-- Battlements left tower -->
  <rect x="7" y="10" width="2" height="3" rx="0.5" fill="white" opacity="0.95"/>
  <rect x="10" y="10" width="2" height="3" rx="0.5" fill="white" opacity="0.95"/>
  <!-- Battlements right tower -->
  <rect x="20" y="10" width="2" height="3" rx="0.5" fill="white" opacity="0.95"/>
  <rect x="23" y="10" width="2" height="3" rx="0.5" fill="white" opacity="0.95"/>
  <!-- Battlements center tower -->
  <rect x="12" y="7" width="2" height="3" rx="0.5" fill="white"/>
  <rect x="15" y="7" width="2" height="3" rx="0.5" fill="white"/>
  <rect x="18" y="7" width="2" height="3" rx="0.5" fill="white"/>
  <!-- Star/sparkle -->
  <circle cx="24" cy="8" r="2" fill="#fde68a" opacity="0.9"/>
</svg>